name: Deployment Signal (Hourly)

on:
  schedule:
    - cron: "07 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deployment-signal-hourly
  cancel-in-progress: false

jobs:
  build-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # -----------------------------
      # Core collector
      # -----------------------------
      - name: Run fetch_and_compute_v2
        run: |
          python scripts/fetch_and_compute_v2.py
          test -s data/hourly_signal.json
          ls -l data/hourly_signal.json

      # -----------------------------
      # History logging
      # -----------------------------
      - name: Log hourly history snapshot
        run: |
          python scripts/fetch_and_log_history.py
          test -d data/history
          find data/history -type f | head -20

      # -----------------------------
      # History index
      # -----------------------------
      - name: Update history index
        run: |
          python scripts/update_history_index.py
          test -s data/history/index.csv
          ls -l data/history/index.csv

      # -----------------------------
      # Labels v1 legacy/support layer
      # Intentionally soft for now.
      # Active model pipeline uses labels v2.
      # -----------------------------
      - name: Build labels v1
        run: |
          python scripts/build_labels_v1.py || true
          ls -R data/labels || true

      - name: Repair labels v1
        run: |
          python scripts/repair_labels_v1.py || true

      - name: Validate labels v1
        run: |
          python scripts/validate_labels_v1.py || true

      - name: Debug labels state
        run: |
          python scripts/debug_labels_state.py || true

      # -----------------------------
      # Labels v2 / active model pipeline
      # -----------------------------
      - name: Build labels v2
        run: |
          python scripts/build_labels_v2.py
          test -s data/labels/labels_v2.csv
          ls -l data/labels/labels_v2.csv

      - name: Build features v1
        run: |
          python scripts/build_features_v1.py
          test -s data/features/features_v1.csv
          ls -l data/features/features_v1.csv

      - name: Build model dataset v1
        run: |
          python scripts/build_model_dataset_v1.py
          test -s data/model/model_dataset_v1.csv
          ls -l data/model/model_dataset_v1.csv

      - name: Build similarity forecast v1
        run: |
          python scripts/build_similarity_forecast_v1.py
          test -s data/model/similarity_forecast_v1.json
          ls -l data/model/similarity_forecast_v1.json

      - name: Build similarity forecast v2
        run: |
          python scripts/build_similarity_forecast_v2.py
          test -s data/model/similarity_forecast_v2.json
          test -s data/model/similarity_forecast_v2_multi.json
          test -s data/model/similarity_forecast_v2_ETH-USDT.json
          test -s data/model/similarity_forecast_v2_BTC-USDT.json
          ls -l data/model/similarity_forecast_v2.json
          ls -l data/model/similarity_forecast_v2_multi.json
          ls -l data/model/similarity_forecast_v2_ETH-USDT.json
          ls -l data/model/similarity_forecast_v2_BTC-USDT.json

      - name: Validate similarity forecast v2 assets
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/model/similarity_forecast_v2_multi.json")
          payload = json.loads(path.read_text(encoding="utf-8"))

          generated = set(payload.get("assets_generated", []))
          required = {"ETH-USDT", "BTC-USDT"}
          missing = sorted(required - generated)

          if missing:
              raise SystemExit(f"Missing generated similarity assets: {missing}")

          failed = payload.get("assets_failed", {})
          if failed:
              raise SystemExit(f"Similarity forecast asset failures: {failed}")

          print("Similarity forecast assets validated:", sorted(generated))
          PY

      - name: Build predictions v1
        run: |
          python scripts/build_predictions_v1.py
          test -s data/model/predictions_v1.csv
          ls -l data/model/predictions_v1.csv

      - name: Validate prediction assets
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          path = Path("data/model/predictions_v1.csv")

          with path.open("r", encoding="utf-8", newline="") as f:
              reader = csv.DictReader(f)
              rows = list(reader)

          assets = {}
          pending_assets = {}

          for row in rows:
              asset = row.get("asset") or "UNKNOWN"
              assets[asset] = assets.get(asset, 0) + 1

              if (row.get("status") or "").strip().lower() != "evaluated":
                  pending_assets[asset] = pending_assets.get(asset, 0) + 1

          required = {"ETH-USDT", "BTC-USDT"}
          missing = sorted(required - set(assets))

          if missing:
              raise SystemExit(f"Missing prediction assets: {missing}; found={assets}")

          print("Prediction assets validated:", assets)
          print("Pending prediction assets:", pending_assets)
          PY

      - name: Evaluate predictions v1
        run: |
          python scripts/evaluate_predictions_v1.py
          test -s data/model/predictions_v1.csv
          ls -l data/model/predictions_v1.csv

      - name: Build performance summary v1
        run: |
          python scripts/build_performance_summary_v1.py
          test -s data/model/performance_summary_v1.json
          ls -l data/model/performance_summary_v1.json

      - name: Build actionability v1
        run: |
          python scripts/build_actionability_v1.py
          test -s data/model/actionability_v1.json
          ls -l data/model/actionability_v1.json

      - name: Validate actionability v1
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/model/actionability_v1.json")
          payload = json.loads(path.read_text(encoding="utf-8"))

          if payload.get("schema") != "actionability_v1":
              raise SystemExit(f"Expected actionability_v1, got {payload.get('schema')}")

          by_asset = payload.get("by_asset", {})
          required = {"ETH-USDT", "BTC-USDT"}
          missing = sorted(required - set(by_asset.keys()))

          if missing:
              raise SystemExit(f"Missing actionability assets: {missing}")

          for asset in required:
              block = by_asset.get(asset, {})
              horizons = block.get("horizons", [])
              found_horizons = {h.get("horizon_h") for h in horizons}
              expected_horizons = {24, 48, 168, 336}

              if found_horizons != expected_horizons:
                  raise SystemExit(
                      f"{asset} actionability horizons mismatch: "
                      f"found={sorted(found_horizons)}, expected={sorted(expected_horizons)}"
                  )

              for h in horizons:
                  if h.get("actionability") not in {"ACTIONABLE", "CAUTION", "NOT_ACTIONABLE"}:
                      raise SystemExit(f"Invalid actionability label for {asset}: {h}")

          print("Actionability v1 validated.")
          PY

      # -----------------------------
      # Baseline forecast
      # -----------------------------
      - name: Build forecast baseline
        run: |
          python scripts/build_forecast_baseline_v1.py
          test -s data/forecast/baseline_probs_v1.csv
          test -s data/forecast/baseline_summary_v1.json
          ls -l data/forecast/baseline_probs_v1.csv
          ls -l data/forecast/baseline_summary_v1.json

      - name: Validate forecast baseline
        run: |
          python scripts/validate_forecast_baseline_v1.py

      # -----------------------------
      # Final report
      # -----------------------------
      - name: Build hourly report
        run: |
          python scripts/build_hourly_report_v1.py
          test -s data/hourly_report.json
          ls -l data/hourly_report.json

      - name: Validate hourly report v2
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/hourly_report.json")
          payload = json.loads(path.read_text(encoding="utf-8"))

          if payload.get("schema") != "hourly_report_v2":
              raise SystemExit(f"Expected hourly_report_v2, got {payload.get('schema')}")

          latest = payload.get("latest_prediction_state", {}).get("assets", {})
          required = {"ETH-USDT", "BTC-USDT"}
          missing = sorted(required - set(latest.keys()))

          if missing:
              raise SystemExit(f"hourly_report missing prediction assets: {missing}")

          for asset in required:
              if not latest.get(asset, {}).get("available"):
                  raise SystemExit(f"hourly_report asset not available: {asset}")

          actionability = payload.get("actionability_state", {})
          if actionability.get("schema") != "actionability_v1":
              raise SystemExit(
                  f"hourly_report missing actionability_v1 block, got {actionability.get('schema')}"
              )

          action_assets = set((actionability.get("by_asset") or {}).keys())
          missing_action_assets = sorted(required - action_assets)

          if missing_action_assets:
              raise SystemExit(
                  f"hourly_report actionability missing assets: {missing_action_assets}"
              )

          print("Hourly report v2 validated.")
          PY

      # -----------------------------
      # AI handoff
      # -----------------------------
      - name: Build AI handoff v1
        run: |
          python scripts/build_ai_handoff_v1.py
          test -s data/ai_handoff_v1.json
          ls -l data/ai_handoff_v1.json

      - name: Validate AI handoff v2
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/ai_handoff_v1.json")
          payload = json.loads(path.read_text(encoding="utf-8"))

          if payload.get("schema") != "ai_handoff_v2":
              raise SystemExit(f"Expected ai_handoff_v2, got {payload.get('schema')}")

          latest = payload.get("latest_prediction_state", {}).get("assets", {})
          required = {"ETH-USDT", "BTC-USDT"}
          missing = sorted(required - set(latest.keys()))

          if missing:
              raise SystemExit(f"ai_handoff missing prediction assets: {missing}")

          for asset in required:
              if not latest.get(asset, {}).get("available"):
                  raise SystemExit(f"ai_handoff asset not available: {asset}")

          similarity_assets = set(
              payload.get("similarity_forecast_state", {}).get("assets_generated", [])
          )

          missing_similarity = sorted(required - similarity_assets)
          if missing_similarity:
              raise SystemExit(f"ai_handoff missing similarity assets: {missing_similarity}")

          actionability = payload.get("actionability_state", {})
          if actionability.get("schema") != "actionability_v1":
              raise SystemExit(
                  f"ai_handoff missing actionability_v1 block, got {actionability.get('schema')}"
              )

          action_assets = set((actionability.get("by_asset") or {}).keys())
          missing_action_assets = sorted(required - action_assets)

          if missing_action_assets:
              raise SystemExit(
                  f"ai_handoff actionability missing assets: {missing_action_assets}"
              )

          print("AI handoff v2 validated.")
          PY

      # -----------------------------
      # Diagnostics
      # -----------------------------
      - name: Build repo diagnostics
        run: |
          python scripts/build_repo_diagnostics.py
          test -s data/diagnostics/repo_status.json
          test -s data/diagnostics/file_sizes.json
          test -s data/diagnostics/model_readiness.json
          test -s data/diagnostics/prediction_summary.json
          test -s data/diagnostics/latest_rows_preview.json
          ls -l data/diagnostics/repo_status.json
          ls -l data/diagnostics/file_sizes.json
          ls -l data/diagnostics/model_readiness.json
          ls -l data/diagnostics/prediction_summary.json
          ls -l data/diagnostics/latest_rows_preview.json

      - name: Validate repo diagnostics
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/diagnostics/repo_status.json")
          payload = json.loads(path.read_text(encoding="utf-8"))

          missing_count = payload.get("summary", {}).get("watched_files_missing_count")
          missing_files = payload.get("missing_watched_files", [])

          if missing_count not in (0, None):
              raise SystemExit(f"Diagnostics reports missing watched files: {missing_files}")

          if missing_files:
              raise SystemExit(f"Diagnostics reports missing watched files: {missing_files}")

          print("Repo diagnostics validated.")
          PY

      - name: Validate diagnostics consistency
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          repo_status_path = Path("data/diagnostics/repo_status.json")
          prediction_summary_path = Path("data/diagnostics/prediction_summary.json")
          model_readiness_path = Path("data/diagnostics/model_readiness.json")

          repo_status = json.loads(repo_status_path.read_text(encoding="utf-8"))
          prediction_summary = json.loads(prediction_summary_path.read_text(encoding="utf-8"))
          model_readiness = json.loads(model_readiness_path.read_text(encoding="utf-8"))

          status_assets = repo_status.get("summary", {}).get("prediction_assets", {})
          summary_assets = prediction_summary.get("by_asset", {})

          if status_assets != summary_assets:
              raise SystemExit(
                  "Diagnostics mismatch: repo_status prediction_assets "
                  f"{status_assets} != prediction_summary by_asset {summary_assets}"
              )

          readiness_assets = model_readiness.get("assets", {})
          required_assets = ["ETH-USDT", "BTC-USDT"]

          for asset in required_assets:
              if asset not in summary_assets:
                  raise SystemExit(f"Missing {asset} in prediction_summary by_asset: {summary_assets}")

              readiness_rows = readiness_assets.get(asset, {}).get("prediction_rows")
              summary_rows = summary_assets.get(asset)

              if readiness_rows != summary_rows:
                  raise SystemExit(
                      f"Diagnostics mismatch for {asset}: "
                      f"model_readiness prediction_rows={readiness_rows}, "
                      f"prediction_summary rows={summary_rows}"
                  )

          print("Diagnostics consistency validated.")
          print("Prediction assets:", summary_assets)
          PY

      # -----------------------------
      # Commit outputs
      # -----------------------------
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -s data/hourly_report.json
          test -s data/ai_handoff_v1.json
          test -s data/diagnostics/repo_status.json
          test -s data/model/actionability_v1.json
          test -s data/model/similarity_forecast_v2_multi.json
          test -s data/model/similarity_forecast_v2_ETH-USDT.json
          test -s data/model/similarity_forecast_v2_BTC-USDT.json

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/ scripts/ requirements.txt .github/workflows/

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Hourly update [skip ci]"
          git push origin HEAD:main
