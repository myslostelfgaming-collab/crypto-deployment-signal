name: Deployment Signal (Hourly)

on:
  schedule:
    - cron: "07 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deployment-signal-hourly
  cancel-in-progress: false

jobs:
  build-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # -----------------------------
      # Core collector
      # -----------------------------
      - name: Run fetch_and_compute_v2
        run: |
          python scripts/fetch_and_compute_v2.py
          test -s data/hourly_signal.json
          ls -l data/hourly_signal.json

      # -----------------------------
      # History logging
      # -----------------------------
      - name: Log hourly history snapshot
        run: |
          python scripts/fetch_and_log_history.py
          test -d data/history
          find data/history -type f | head -20

      # -----------------------------
      # History index
      # -----------------------------
      - name: Update history index
        run: |
          python scripts/update_history_index.py
          test -s data/history/index.csv
          ls -l data/history/index.csv

      # -----------------------------
      # Labels v1 legacy/support layer
      # Intentionally soft for now.
      # Active model pipeline uses labels v2.
      # -----------------------------
      - name: Build labels v1
        run: |
          python scripts/build_labels_v1.py || true
          ls -R data/labels || true

      - name: Repair labels v1
        run: |
          python scripts/repair_labels_v1.py || true

      - name: Validate labels v1
        run: |
          python scripts/validate_labels_v1.py || true

      - name: Debug labels state
        run: |
          python scripts/debug_labels_state.py || true

      # -----------------------------
      # Labels v2 / active model pipeline
      # Hard fail if active outputs are missing.
      # -----------------------------
      - name: Build labels v2
        run: |
          python scripts/build_labels_v2.py
          test -s data/labels/labels_v2.csv
          ls -l data/labels/labels_v2.csv

      - name: Build features v1
        run: |
          python scripts/build_features_v1.py
          test -s data/features/features_v1.csv
          ls -l data/features/features_v1.csv

      - name: Build model dataset v1
        run: |
          python scripts/build_model_dataset_v1.py
          test -s data/model/model_dataset_v1.csv
          ls -l data/model/model_dataset_v1.csv

      - name: Build similarity forecast v1
        run: |
          python scripts/build_similarity_forecast_v1.py
          test -s data/model/similarity_forecast_v1.json
          ls -l data/model/similarity_forecast_v1.json

      - name: Build similarity forecast v2
        run: |
          python scripts/build_similarity_forecast_v2.py
          test -s data/model/similarity_forecast_v2.json
          test -s data/model/similarity_forecast_v2_multi.json
          test -s data/model/similarity_forecast_v2_ETH-USDT.json
          test -s data/model/similarity_forecast_v2_BTC-USDT.json
          ls -l data/model/similarity_forecast_v2.json
          ls -l data/model/similarity_forecast_v2_multi.json
          ls -l data/model/similarity_forecast_v2_ETH-USDT.json
          ls -l data/model/similarity_forecast_v2_BTC-USDT.json

      - name: Validate similarity forecast v2 assets
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/model/similarity_forecast_v2_multi.json")
          payload = json.loads(path.read_text(encoding="utf-8"))

          generated = set(payload.get("assets_generated", []))
          required = {"ETH-USDT", "BTC-USDT"}
          missing = sorted(required - generated)

          if missing:
              raise SystemExit(f"Missing generated similarity assets: {missing}")

          failed = payload.get("assets_failed", {})
          if failed:
              raise SystemExit(f"Similarity forecast asset failures: {failed}")

          print("Similarity forecast assets validated:", sorted(generated))
          PY

      - name: Build predictions v1
        run: |
          python scripts/build_predictions_v1.py
          test -s data/model/predictions_v1.csv
          ls -l data/model/predictions_v1.csv

      - name: Evaluate predictions v1
        run: |
          python scripts/evaluate_predictions_v1.py
          test -s data/model/predictions_v1.csv
          ls -l data/model/predictions_v1.csv

      - name: Build performance summary v1
        run: |
          python scripts/build_performance_summary_v1.py
          test -s data/model/performance_summary_v1.json
          ls -l data/model/performance_summary_v1.json

      # -----------------------------
      # Baseline forecast
      # -----------------------------
      - name: Build forecast baseline
        run: |
          python scripts/build_forecast_baseline_v1.py
          test -s data/forecast/baseline_probs_v1.csv
          test -s data/forecast/baseline_summary_v1.json
          ls -l data/forecast/baseline_probs_v1.csv
          ls -l data/forecast/baseline_summary_v1.json

      - name: Validate forecast baseline
        run: |
          python scripts/validate_forecast_baseline_v1.py

      # -----------------------------
      # Final report
      # -----------------------------
      - name: Build hourly report
        run: |
          python scripts/build_hourly_report_v1.py
          test -s data/hourly_report.json
          ls -l data/hourly_report.json

      # -----------------------------
      # AI handoff
      # -----------------------------
      - name: Build AI handoff v1
        run: |
          python scripts/build_ai_handoff_v1.py
          test -s data/ai_handoff_v1.json
          ls -l data/ai_handoff_v1.json

      # -----------------------------
      # Diagnostics
      # -----------------------------
      - name: Build repo diagnostics
        run: |
          python scripts/build_repo_diagnostics.py
          test -s data/diagnostics/repo_status.json
          test -s data/diagnostics/file_sizes.json
          test -s data/diagnostics/model_readiness.json
          test -s data/diagnostics/prediction_summary.json
          test -s data/diagnostics/latest_rows_preview.json
          ls -l data/diagnostics/repo_status.json
          ls -l data/diagnostics/file_sizes.json
          ls -l data/diagnostics/model_readiness.json
          ls -l data/diagnostics/prediction_summary.json
          ls -l data/diagnostics/latest_rows_preview.json

      - name: Validate repo diagnostics
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/diagnostics/repo_status.json")
          payload = json.loads(path.read_text(encoding="utf-8"))

          missing_count = payload.get("summary", {}).get("watched_files_missing_count")
          missing_files = payload.get("missing_watched_files", [])

          if missing_count not in (0, None):
              raise SystemExit(f"Diagnostics reports missing watched files: {missing_files}")

          if missing_files:
              raise SystemExit(f"Diagnostics reports missing watched files: {missing_files}")

          print("Repo diagnostics validated.")
          PY

      # -----------------------------
      # Commit outputs
      # -----------------------------
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -s data/hourly_report.json
          test -s data/ai_handoff_v1.json
          test -s data/diagnostics/repo_status.json
          test -s data/model/similarity_forecast_v2_multi.json
          test -s data/model/similarity_forecast_v2_ETH-USDT.json
          test -s data/model/similarity_forecast_v2_BTC-USDT.json

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/ scripts/ requirements.txt .github/workflows/

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Hourly update [skip ci]"
          git push origin HEAD:main
