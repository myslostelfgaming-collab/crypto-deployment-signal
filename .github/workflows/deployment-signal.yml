name: Deployment Signal (Hourly)

on:
  schedule:
    - cron: "07 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deployment-signal-hourly
  cancel-in-progress: false

jobs:
  build-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (fresh install)
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # -----------------------------
      # V2 Collector (THIS IS THE TEST)
      # -----------------------------
      - name: Run fetch_and_compute_v2
        run: |
          python scripts/fetch_and_compute_v2.py
          ls -R data || true

      # -----------------------------
      # History logging
      # -----------------------------
      - name: Log hourly history snapshot
        run: |
          python scripts/fetch_and_log_history.py
          ls -R data/history || true

      # -----------------------------
      # History index
      # -----------------------------
      - name: Update history index
        run: |
          python scripts/update_history_index.py
          ls -l data/history/index.csv || true

      # -----------------------------
      # Labels
      # -----------------------------
      - name: Build labels
        run: |
          python scripts/build_labels_v1.py || true
          ls -R data/labels || true

      - name: Repair labels
        run: |
          python scripts/repair_labels_v1.py || true

      - name: Validate labels
        run: |
          python scripts/validate_labels_v1.py || true

      - name: Debug labels
        run: |
          python scripts/debug_labels_state.py || true

      # -----------------------------
      # Forecast
      # -----------------------------
      - name: Build forecast baseline
        run: |
          python scripts/build_forecast_baseline_v1.py || true
          ls -R data/forecast || true

      - name: Validate forecast
        run: |
          python scripts/validate_forecast_baseline_v1.py || true

      # -----------------------------
      # Final report
      # -----------------------------
      - name: Build hourly report
        run: |
          python scripts/build_hourly_report_v1.py || true
          ls -l data/hourly_report.json || true

      # -----------------------------
      # Commit outputs
      # -----------------------------
      - name: Commit and push
        run: |
          if [ ! -f data/hourly_report.json ]; then
            echo "No report generated"
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Hourly update [skip ci]"
          git push